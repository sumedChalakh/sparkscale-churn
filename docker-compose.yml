# ─────────────────────────────────────────────
# SparkScale Churn — Local Spark Cluster
# Zaalima Development | Project 4 | Week 1
# ─────────────────────────────────────────────

services:

  # ── SPARK MASTER ──────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    command: >
      /bin/bash -c "
      /opt/spark/sbin/start-master.sh &&
      sleep 3 &&
      tail -f /opt/spark/logs/*.out"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
    networks:
      - spark-network

  # ── SPARK WORKER 1 ────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: spark-worker-1
    command: >
      /bin/bash -c "
      sleep 6 &&
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --memory 2G --cores 2 &&
      sleep 3 &&
      tail -f /opt/spark/logs/*.out"
    ports:
      - "8081:8081"
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
    depends_on:
      - spark-master
    networks:
      - spark-network

  # ── SPARK WORKER 2 ────────────────────────
  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: spark-worker-2
    command: >
      /bin/bash -c "
      sleep 6 &&
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --memory 2G --cores 2 &&
      sleep 3 &&
      tail -f /opt/spark/logs/*.out"
    ports:
      - "8082:8081"
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
    depends_on:
      - spark-master
    networks:
      - spark-network

  # ── JUPYTER LAB (EDA only) ────────────────
  jupyter:
    image: jupyter/pyspark-notebook:python-3.11
    container_name: jupyter-spark
    environment:
      - JUPYTER_ENABLE_LAB=yes
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - spark-network

# ── NETWORK ───────────────────────────────
networks:
  spark-network:
    driver: bridge